# Default guardrail configuration
# All rules enabled with sensible defaults.

# Workspace root — path safety restricts file operations to this tree.
# Set to "." for current directory, or an absolute path.
workspace: "."

path_safety:
  enabled: true
  # Paths that are always blocked (even inside workspace)
  blocked_prefixes:
    - "/etc/"
    - "/sys/"
    - "/proc/"
    - "/boot/"
    - "/dev/"
    - "/root/"
    - "/var/log/"
  # Additional allowed paths outside workspace (e.g. system includes)
  # allowed_prefixes: []

command_safety:
  enabled: true
  strength: hard  # hard = block, soft = nudge only
  blocked_commands:
    - "rm -rf /"
    - "rm -rf /*"
    - "mkfs"
    - "dd if="
    - ":(){ :|:& };:"
    - "> /dev/sd"
    - "shutdown"
    - "reboot"
    - "init 0"
    - "init 6"
    - "systemctl stop"

secrets:
  enabled: true
  strength: hard  # hard = block, soft = mask and warn
  mask_value: "[REDACTED]"
  # Patterns: AWS keys, GitHub tokens, private keys, generic API keys

prerequisites:
  enabled: true
  max_violations: 4   # Block after 4 unread edits (was 2 — too aggressive)
  edit_tools:
    - "edit"
    - "write"
    - "create"
  read_tools:
    - "read"
    - "cat"
    - "head"
    - "tail"
    - "less"

sequencing:
  enabled: true
  strength: soft  # soft = suggest, hard = block until test runs
  cooldown: 3
  trigger_prefixes:
    - "edit"
    - "write"
    - "create"
  suggest_prefixes:
    - "bash"
    - "shell"
    - "exec"
  nudge: "Consider running tests to verify your changes."

tool_resolution:
  enabled: true
  strength: soft  # soft = nudge only
  # Nudges when tool results are empty, whitespace-only, or permission errors

session_budget:
  enabled: true
  max_file_ops: 300    # 100 was too low for multi-file tasks with retries
  max_commands: 500    # 200 was too low — model uses sed/head/awk to inspect
  max_reads: 0         # unlimited reads (model must read before editing)
  warn_at: 0.85
